name: Deploy dashboard to GitHub Pages

# The dashboards in docs/ are pre-built static HTML (generated by
# update_dashboard.py / build_insights.py and committed by the sync + refresh
# skills). This workflow uploads docs/ as-is and deploys it via the modern
# Pages artifact flow — no Jekyll processing. It replaces the legacy
# "deploy from a branch" build.
#
# Split into build + deploy jobs (the official GitHub pattern) so a deploy-only
# re-run never re-uploads the artifact. GitHub Pages deployments occasionally
# fail with a transient "Deployment failed, try again later" — when that
# happens, re-run just the deploy job (gh run rerun <id> --job deploy).

on:
  # Redeploy whenever the published site or this workflow changes.
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  # Allow manual redeploys from the Actions tab.
  workflow_dispatch:

# Least-privilege token scoped for Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialise deploys: never run two at once, and let an in-flight deploy finish
# rather than cancelling it half-done.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload docs/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
