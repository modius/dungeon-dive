<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Health — Dungeon Dive Video Archive</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232733;
    --border: #2e3347;
    --text: #e2e4eb;
    --text-dim: #8b8fa3;
    --text-faint: #5c6078;
    --accent: #818cf8;
    --green: #34d399;
    --green-dim: #064e3b;
    --amber: #fbbf24;
    --amber-dim: #78350f;
    --red: #f87171;
    --purple: #a78bfa;
    --gold: #d4a853;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }
  .container { max-width: 1100px; margin: 0 auto; }

  /* Hero */
  .hero {
    position: relative; height: 220px; margin: -24px -24px 28px -24px;
    background-size: cover; background-position: center;
    display: flex; align-items: flex-end; padding: 24px 32px;
    border-radius: 0 0 16px 16px;
  }
  .hero::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(15,17,23,0.2) 0%, rgba(15,17,23,0.8) 65%, rgba(15,17,23,1) 100%);
    border-radius: 0 0 16px 16px;
  }
  .hero-content { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; width: 100%; }
  .hero h1 { font-size: 32px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; margin-bottom: 4px; }
  .hero .subtitle { color: var(--text-dim); font-size: 14px; }
  .nav {
    position: absolute; top: 16px; left: 0; right: 0; z-index: 2;
    display: flex; gap: 6px; justify-content: center; align-items: center;
  }
  .nav a {
    color: rgba(255,255,255,0.7); text-decoration: none; padding: 7px 14px;
    border-radius: 8px; font-size: 12px; letter-spacing: 0.3px;
    backdrop-filter: blur(8px); background: rgba(0,0,0,0.3); transition: all 0.2s;
    border: 1px solid transparent;
  }
  .nav a:hover { color: #fff; background: rgba(0,0,0,0.5); }
  .nav a.active { color: #fff; background: rgba(0,0,0,0.5); border-bottom: 2px solid var(--gold); }
  .nav .sep { color: rgba(255,255,255,0.2); font-size: 12px; }

  /* Summary cards */
  .summary-cards {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 14px;
    margin-bottom: 28px;
  }
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    position: relative;
    overflow: hidden;
  }
  .summary-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .summary-card.status-pass::before { background: var(--green); }
  .summary-card.status-warn::before { background: var(--amber); }
  .summary-card.status-error::before { background: var(--red); }
  .card-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .card-value {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }
  .card-detail { font-size: 11px; color: var(--text-faint); }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.3px;
    line-height: 1;
  }
  .badge-pass { background: #052e23; color: #6ee7b7; }
  .badge-warn { background: var(--amber-dim); color: var(--amber); }
  .badge-error { background: #3b1111; color: var(--red); }

  /* Chart cards */
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 28px;
  }
  .chart-title {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  /* Donut row */
  .donut-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    align-items: center;
  }
  .donut-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .donut-wrap canvas { max-width: 220px; max-height: 220px; }
  .donut-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .coverage-note {
    text-align: center;
    font-size: 13px;
    color: var(--text-faint);
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  /* Table */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 28px;
  }
  .table-header {
    padding: 16px 20px 0 20px;
  }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--surface2); }
  th {
    text-align: left;
    padding: 12px 16px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-faint);
    font-weight: 600;
    border-bottom: 1px solid var(--border);
  }
  td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  tr:hover { background: rgba(129, 140, 248, 0.04); }
  .date-cell { color: var(--text-dim); white-space: nowrap; font-variant-numeric: tabular-nums; }
  .link { text-decoration: none; font-weight: 600; font-size: 12px; letter-spacing: 0.3px; }
  .link-yt { color: var(--red); }
  .link-yt:hover { color: #fca5a5; }

  /* Recommendations */
  .rec-list {
    list-style: none;
    padding: 0;
  }
  .rec-list li {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .rec-list li:last-child { border-bottom: none; }
  .rec-list li::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--amber);
    flex-shrink: 0;
  }

  /* Responsive */
  @media (max-width: 900px) {
    .summary-cards { grid-template-columns: repeat(3, 1fr); }
    .donut-row { grid-template-columns: 1fr; }
  }
  @media (max-width: 600px) {
    .summary-cards { grid-template-columns: repeat(2, 1fr); }
    .nav { flex-wrap: wrap; }
  }
</style>
</head>

    <ul class="rec-list" id="rec-list"></ul>
  </div>

</div>

<script>
document.addEventListener('DOMContentLoaded', () => {

  // --- 1. Summary Cards ---
  const checks = INTEGRITY.checks;
  const cards = [
    {
      label: 'Index Integrity',
      status: checks.index_integrity.status,
      value: checks.index_integrity.status.toUpperCase(),
      detail: checks.index_integrity.issues[0] || 'No issues'
    },
    {
      label: 'Archive Coverage',
      status: checks.archive_files.status,
      value: checks.archive_files.post_files_count + ' / ' + checks.archive_files.transcript_files_count,
      detail: 'post files / transcripts'
    },
    {
      label: 'File Validity',
      status: checks.file_validity.status,
      value: checks.file_validity.status.toUpperCase(),
      detail: (checks.file_validity.posts_checked + checks.file_validity.transcripts_checked) + ' files checked'
    },
    {
      label: 'Naming Issues',
      status: checks.naming_anomalies.status,
      value: String(checks.naming_anomalies.legacy_count),
      detail: 'legacy transcript files'
    },
    {
      label: 'Dashboard Sync',
      status: checks.dashboard_sync.status,
      value: checks.dashboard_sync.status.toUpperCase(),
      detail: checks.dashboard_sync.mismatch_count + ' mismatches'
    }
  ];

  const cardsEl = document.getElementById('summary-cards');
  cards.forEach(c => {
    const div = document.createElement('div');
    div.className = 'summary-card status-' + c.status;
    div.innerHTML = `
      <div class="card-label">${c.label}</div>
      <div class="card-value"><span class="badge badge-${c.status}">${c.value}</span></div>
      <div class="card-detail">${c.detail}</div>
    `;
    cardsEl.appendChild(div);
  });

  // --- 2. Archive Coverage Donuts ---
  const imported = checks.index_integrity.counts.imported;
  const pending = checks.index_integrity.counts.pending;
  const noTranscript = checks.index_integrity.counts.no_transcript;
  const missingPosts = checks.archive_files.missing_posts_count;
  const missingTranscripts = checks.archive_files.missing_transcripts_count;
  const havePosts = imported - missingPosts;
  const haveTranscripts = imported - missingTranscripts;

  const donutOpts = {
    responsive: true,
    maintainAspectRatio: true,
    cutout: '65%',
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#1a1d27',
        titleColor: '#e2e4eb',
        bodyColor: '#8b8fa3',
        borderColor: '#2e3347',
        borderWidth: 1
      }
    }
  };

  const donutColors = ['#34d399', '#f87171', '#5c6078'];

  // Transcripts donut
  new Chart(document.getElementById('chart-transcripts'), {
    type: 'doughnut',
    data: {
      labels: ['Have transcript', 'Imported missing', 'Pending/Other'],
      datasets: [{
        data: [haveTranscripts, missingTranscripts, pending + noTranscript],
        backgroundColor: donutColors,
        borderWidth: 0
      }]
    },
    options: donutOpts,
    plugins: [{
      id: 'centerText',
      afterDraw(chart) {
        const { ctx, chartArea: { left, right, top, bottom } } = chart;
        const cx = (left + right) / 2;
        const cy = (top + bottom) / 2;
        ctx.save();
        ctx.fillStyle = '#e2e4eb';
        ctx.font = 'bold 28px Inter, system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(haveTranscripts, cx, cy - 8);
        ctx.font = '11px Inter, system-ui, sans-serif';
        ctx.fillStyle = '#8b8fa3';
        ctx.fillText('of ' + imported + ' imported', cx, cy + 14);
        ctx.restore();
      }
    }]
  });

  // Posts donut
  new Chart(document.getElementById('chart-posts'), {
    type: 'doughnut',
    data: {
      labels: ['Have post', 'Imported missing', 'Pending/Other'],
      datasets: [{
        data: [havePosts, missingPosts, pending + noTranscript],
        backgroundColor: donutColors,
        borderWidth: 0
      }]
    },
    options: donutOpts,
    plugins: [{
      id: 'centerText2',
      afterDraw(chart) {
        const { ctx, chartArea: { left, right, top, bottom } } = chart;
        const cx = (left + right) / 2;
        const cy = (top + bottom) / 2;
        ctx.save();
        ctx.fillStyle = '#e2e4eb';
        ctx.font = 'bold 28px Inter, system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(havePosts, cx, cy - 8);
        ctx.font = '11px Inter, system-ui, sans-serif';
        ctx.fillStyle = '#8b8fa3';
        ctx.fillText('of ' + imported + ' imported', cx, cy + 14);
        ctx.restore();
      }
    }]
  });

  document.getElementById('coverage-note').textContent =
    missingPosts + ' imported videos missing post files \u2022 ' +
    missingTranscripts + ' missing transcripts';

  // --- 3. Sync Activity Timeline ---
  new Chart(document.getElementById('chart-timeline'), {
    type: 'bar',
    data: {
      labels: BATCH_DATA.map(b => b.date),
      datasets: [{
        label: 'Videos posted',
        data: BATCH_DATA.map(b => b.count),
        backgroundColor: 'rgba(129, 140, 248, 0.7)',
        borderColor: '#818cf8',
        borderWidth: 1,
        borderRadius: 4
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        x: {
          grid: { color: '#2e3347' },
          ticks: { color: '#5c6078', font: { size: 10 }, maxRotation: 45 }
        },
        y: {
          beginAtZero: true,
          grid: { color: '#2e3347' },
          ticks: { color: '#5c6078', font: { size: 11 } },
          title: { display: true, text: 'Videos posted', color: '#8b8fa3', font: { size: 12 } }
        }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1d27',
          titleColor: '#e2e4eb',
          bodyColor: '#8b8fa3',
          borderColor: '#2e3347',
          borderWidth: 1
        }
      }
    }
  });

  // --- 4. Problem Videos Table ---
  const tbody = document.getElementById('problem-table');
  PROBLEM_VIDEOS.forEach(v => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${v.title}</td>
      <td class="date-cell">${v.published_at}</td>
      <td><a class="link link-yt" href="https://www.youtube.com/watch?v=${v.video_id}" target="_blank" rel="noopener">YouTube</a></td>
    `;
    tbody.appendChild(tr);
  });

  // --- 5. Recommendations ---
  const recList = document.getElementById('rec-list');
  INTEGRITY.recommendations.forEach(r => {
    const li = document.createElement('li');
    li.textContent = r;
    recList.appendChild(li);
  });

});
</script>
